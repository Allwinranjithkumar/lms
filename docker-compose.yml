services:
  db:
    image: postgres:16-alpine
    container_name: jawa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jawa
    ports:
      - "5432:5432"
    volumes:
      - jawa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jawa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jawa_pgdata:
